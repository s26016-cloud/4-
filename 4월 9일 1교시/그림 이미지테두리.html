<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
p{background-color: yellow;
width: 200px;
height: 60px;
padding: 20px;
border: 20px solid cyan;}
#round{border-image:url("그림2.png") 30 round;}/*아이디 셀렉터에는 #를 붙임*/
#repeat{border-image:url("그림2.png") 30 repeat;}
#stretch{border-image:url("그림2.png") 30 stretch;}
</style>
</head>
<body>
    <p>태그를 사용해서 이미지테두리를 입힙니다.</p>
    <p id="round">round태그</p>
    <p id="repeat">repeat태그</p>
    <p id="stretch">stretch태그</p>
</body>
</html>
