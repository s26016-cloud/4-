<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    h3{text-align: right;}
    span{text-decoration: line-through;}<!--가운데 최소-->
    strong{text-decoration: overline;}
    .p1{text-indent: 3em;}<!--.은 클래스를 의미-->
    .p2{text-indent: 1em;
    text-align: center;}
</style>
</head>
<body>
    <h3>텍스트 꾸미기</h3>
    <p class="p1">여기서 연습하는건<span>텍스트제어</span></p>
    <p class="p2"><strong>스타일 시트</strong>연습</p>
</body>
</html>
