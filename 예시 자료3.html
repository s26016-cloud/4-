<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>font-style 비교</title>
<style>
  p {
    font-size: 24px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<p style="font-style: normal;">normal → 기본 글꼴</p>
<p style="font-style: italic;">italic → 글꼴 디자인이 기울어진 글꼴</p>
<p style="font-style: oblique;">oblique → 글자를 단순히 기울임</p>
