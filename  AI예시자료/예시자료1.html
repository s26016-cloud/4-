<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>정렬 비교 - 공백 강조</title>
<style>
  p {
    width: 250px;           /* 줄 길이 짧게 */
    border: 1px solid #000; /* 경계 확인용 */
    padding: 5px;
    margin-bottom: 15px;
  }
  .left   { text-align: left; }
  .center { text-align: center; }
  .right  { text-align: right; }
  .justify{ text-align: justify; }
</style>
</head>
<body>

<h3>왼쪽 정렬</h3>
<p class="left">
이 텍스트는 왼쪽 정렬입니다. 오른쪽 끝이 들쭉날쭉합니다.
</p>

<h3>가운데 정렬</h3>
<p class="center">
이 텍스트는 가운데 정렬입니다. 좌우 균형은 맞지만 양끝은 맞지 않습니다.
</p>

<h3>오른쪽 정렬</h3>
<p class="right">
이 텍스트는 오른쪽 정렬입니다. 왼쪽 끝이 들쭉날쭉합니다.
</p>

<h3>양쪽 정렬 (justify)</h3>
<p class="justify">
이 텍스트는 양쪽 정렬입니다. 좌우 끝이 딱 맞춰지고 단어 사이 간격이 자동으로 조정됩니다.
</p>

</body>
</html>
